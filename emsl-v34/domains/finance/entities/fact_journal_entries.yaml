entity:
  name: fact_journal_entries
  type: fact
  warehouse_layer: DWS
  database: PROD_DB
  schema_name: DWS_FINANCE
  table_name: FACT_JOURNAL_ENTRIES
  columns:
    - { name: journal_id, data_type: "VARCHAR(64)", is_pk: true }
    - { name: posting_date, data_type: DATE, partition: true }
    - { name: account_id, data_type: "VARCHAR(16)" }
    - { name: cost_center_id, data_type: "VARCHAR(16)" }
    - { name: debit_amount, data_type: "DECIMAL(18,2)" }
    - { name: credit_amount, data_type: "DECIMAL(18,2)" }
  lineage: { upstream: [{ entity: "ods.erp_gl_entries", transform: "standardize_accounts" }] }
  quality: { freshness: { update_mode: incremental, schedule: "0 4 * * *", sla_tier: tier_1_critical } }
