analytic_method:
  name: hr_forecasting
  category: forecasting
  compatible_objects: [employee]
  trigger_intents: ["attrition risk", "workforce demand"]
  models:
    - { name: attrition_model, algorithm: xgboost, target: is_terminated_90d, horizon: 90 }
    - { name: demand_forecast, algorithm: prophet, target: headcount_demand, horizon: 90 }
