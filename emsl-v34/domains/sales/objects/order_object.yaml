object: { name: order, domain: sales, ontology_class: TransactionEvent }
entity_binding:
  primary: fact_sales
  enrichments: [{ entity: dim_customer, join_key: customer_id }, { entity: dim_channel, join_key: channel_id }]
metric_refs: [metrics/sales_metrics#net_revenue, metrics/sales_metrics#aov]

  dashboard_hint:
    title_template: "Sales performance dashboard"
    refresh_grain: daily
    sections:
      - section: summary
        layout: scorecard_row
        metrics:
          - { ref: net_revenue, label: "Net Revenue", comparison: mom }
          - { ref: total_gmv, label: "GMV", comparison: mom }
          - { ref: aov, label: "AOV", comparison: mom }
          - { ref: order_count, label: "Orders", comparison: mom }
      - section: trends
        layout: chart_row
        items:
          - { metric: net_revenue, dimensions: [time], grain: day, chart: line_chart, span: 30_days }
          - { metric: order_count, dimensions: [time], grain: day, chart: bar_chart, span: 30_days }
      - section: channels
        layout: chart_row
        items:
          - { metric: net_revenue, dimensions: [channel], chart: donut }
          - { metric: aov, dimensions: [channel], chart: bar_chart, sort: desc }
      - section: products
        layout: chart_single
        items:
          - { metric: net_revenue, dimensions: [product_category], chart: treemap }
