metric_group: { name: sales_metrics, domain: sales }

t3_atomic:
  - name: total_gmv
    aggregation_expression: "SUM(gmv)"
    source_entity: fact_sales
    display_format: currency
    display_hint:
      chart_type: time_series
      alert_direction: up_is_good
      sparkline: true

  - name: refund_amount
    aggregation_expression: "SUM(refund_amount)"
    source_entity: fact_sales
    display_format: currency
    display_hint:
      chart_type: time_series
      alert_direction: up_is_bad
      sparkline: true

  - name: order_count
    aggregation_expression: "COUNT(DISTINCT order_id)"
    source_entity: fact_sales
    display_format: count
    display_hint:
      chart_type: bar_chart
      sparkline: true

t2_derived:
  - name: net_revenue
    formula: "total_gmv - refund_amount"
    depends_on: [total_gmv, refund_amount]
    display_format: currency
    display_hint:
      chart_type: time_series
      alert_direction: up_is_good
      comparison_periods: [mom, qoq, yoy]

  - name: aov
    formula: "net_revenue / order_count"
    depends_on: [net_revenue, order_count]
    display_format: currency
    display_hint:
      chart_type: bar_chart
      alert_direction: up_is_good
      sort: descending
