# L0 Ontology: Measurement Types
measurement_types:
  - { name: currency,   base_unit: CNY, precision: 2, display: "{value:,.2f}" }
  - { name: percentage, range: [0,100], precision: 2, display: "{value:.2f}%" }
  - { name: ratio,      precision: 4, division_guard: "NULLIF(denominator, 0)" }
  - { name: count,      precision: 0, display: "{value:,.0f}" }
  - { name: duration,   base_unit: days, precision: 1, display: "{value:.1f} days" }
