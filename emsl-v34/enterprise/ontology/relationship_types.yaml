# L0 Ontology: Relationship Types
relationship_types:
  - { name: placed_by,     from: TransactionEvent, to: MasterData,       cardinality: many_to_one }
  - { name: contains,      from: TransactionEvent, to: ReferenceData,    cardinality: many_to_many }
  - { name: attributed_to, from: TransactionEvent, to: ProcessEvent,     cardinality: many_to_one }
  - { name: employs,       from: MasterData,       to: MasterData,       cardinality: one_to_many }
  - { name: reports_to,    from: MasterData,       to: MasterData,       cardinality: many_to_one }
  - { name: records_for,   from: FinancialRecord,  to: TransactionEvent, cardinality: many_to_one }
  - { name: belongs_to,    from: FinancialRecord,  to: ReferenceData,    cardinality: many_to_one }
