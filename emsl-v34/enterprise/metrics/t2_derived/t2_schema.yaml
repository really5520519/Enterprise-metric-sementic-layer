# L4 Metric: T2 Derived Schema (depends on T3)
t2_derived:
  tier: T2
  label: "Derived metric"
  dependency: "depends_on T3 only"
  required: [name, formula, depends_on]
  validation: ["depends_on must only reference T3 names", "no circular deps"]
  optional:
    - field: display_hint
      type: object
      properties:
        chart_type: { type: string, enum: [time_series, bar_chart, scatter, heatmap, donut] }
        alert_direction: { type: string, enum: [up_is_good, up_is_bad, context_dependent] }
        benchmark: { type: object }
        comparison_periods: { type: array }
        sort: { type: string, enum: [ascending, descending, alphabetical] }
  examples:
    - { name: net_revenue,    formula: "total_gmv - refund_amount",  depends_on: [total_gmv, refund_amount] }
    - { name: attrition_rate, formula: "terminations / headcount",   depends_on: [terminations, headcount] }
