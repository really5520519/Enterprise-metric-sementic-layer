# L4 Metric: T3 Atomic Schema (depends on L1 entity)
t3_atomic:
  tier: T3
  label: "Atomic metric"
  dependency: none
  required: [name, aggregation_expression, source_entity]
  optional:
    - field: display_hint
      type: object
      properties:
        chart_type: { type: string, enum: [scorecard, time_series, bar_chart] }
        alert_direction: { type: string, enum: [up_is_good, up_is_bad, context_dependent] }
        sparkline: { type: boolean, default: false }
        benchmark: { type: object, properties: { good_below: number, warning_above: number } }
        comparison_periods: { type: array, items: [mom, qoq, yoy] }
  examples:
    - { name: total_gmv,    aggregation_expression: "SUM(gmv)",                 source_entity: fact_sales }
    - { name: headcount,    aggregation_expression: "COUNT(DISTINCT CASE WHEN status='active' AND employment_type='FTE' THEN employee_id END)", source_entity: fact_workforce }
    - { name: total_debit,  aggregation_expression: "SUM(debit_amount)",        source_entity: fact_journal_entries }
