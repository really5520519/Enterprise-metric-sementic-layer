# L6 Governance: Cross-Domain Access (consumes Identity)
access_policy:
  default: deny_unless_granted
  role_matrix:
    executive:          { allowed_domains: ["*"], operations: [query, audit] }
    domain_owner:       { allowed_domains: ["own", "cross_domain"], operations: [query, audit, contribute] }
    analyst:            { allowed_domains: ["own"], cross_domain: "aggregated_only" }
    finance_controller: { allowed_domains: ["*"], purpose: "reconciliation" }
