# L6 [M1] Progressive Compliance
compliance_levels:
  L0_bootstrap:    { requirements: ["manifest", "1+ entity", "1+ T3 metric"], unlocks: ["single-domain query"], mode: skip }
  L1_operational:  { requirements: ["+object", "+T2 metrics", "+lineage", "+glossary 5+"], unlocks: ["cross-domain draft", "glossary"], mode: advisory }
  L2_governed:     { requirements: ["+quality metadata", "+access rules", "+PII masking"], unlocks: ["cross-domain prod", "heartbeat"], mode: enforced_warn }
  L3_excellence:   { requirements: ["+methods", "+disambiguation", "+full lineage"], unlocks: ["enterprise featuring"], mode: enforced_strict }
