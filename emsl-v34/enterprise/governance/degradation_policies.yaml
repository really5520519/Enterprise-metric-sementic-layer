# L6 [M3] Graceful Degradation
degradation:
  freshness_violation:
    - { condition: "lag < 2x SLA",  action: warn_and_serve }
    - { condition: "lag < 5x SLA",  action: serve_with_caveat, notify: [steward] }
    - { condition: "lag >= 5x SLA", action: block_with_alternative, create_incident: true }
  access_violation: { action: partial_result }
