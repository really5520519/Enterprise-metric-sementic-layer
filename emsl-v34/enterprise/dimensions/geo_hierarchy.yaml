# L3 Dimension: Geography
dimension:
  name: enterprise_geo
  type: hierarchical
  shared: true
  hierarchy:
    levels:
      - { order: 1, name: country, column: country_name }
      - { order: 2, name: province, column: province_name, parent: country }
      - { order: 3, name: city, column: city_name, parent: province }
  entity_ref: enterprise_dim_geo
