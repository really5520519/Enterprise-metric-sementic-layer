# L1 Entity: Lineage Graph
lineage_graph:
  edge_types:
    upstream:   { fields: [entity, transform, warehouse_layer] }
    downstream: { fields: [entity, consumer] }
  join_path_cache:
    description: "Pre-built at setup time by Accelerator"
    schema: { name: string, tables: array, join_sql: string, used_by_metrics: array }
  integrity_rules:
    - "upstream warehouse_layer N must be N-1 or lower"
    - "no circular dependencies"
