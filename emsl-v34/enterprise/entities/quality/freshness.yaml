# L1 Quality: Freshness State (FACT — thresholds live in L6 governance)
freshness:
  schema:
    entity: { type: string, required: true }
    update_mode: { type: string, enum: [full_load, incremental] }
    schedule: { type: string, description: "Cron expression" }
    last_refresh: { type: string, format: datetime }
    lag_minutes: { type: integer }
    sla_tier: { type: string, enum: [tier_1_critical, tier_2_standard, tier_3_analytical] }
