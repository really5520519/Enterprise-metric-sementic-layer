# L1 Quality: Dataset Profile (FACT, not RULE)
dataset_profile:
  description: "Statistical profile per entity. This is observed state, not policy."
  schema:
    entity: { type: string, required: true }
    row_count: { current: integer, previous: integer, change_pct: number }
    null_rates: { type: array, items: { column: string, null_pct: number } }
    anomaly_thresholds: { type: array, items: { column: string, rule: string } }
