# L1 Entity: Table Catalog
table_catalog:
  warehouse_layers:
    ODS: { label: "Raw/Source",       naming: "ods_{source}_{table}" }
    DWD: { label: "Detail/Cleansed",  naming: "dwd_{domain}_{entity}_di" }
    DWS: { label: "Summary/Aggregated", naming: "dws_{domain}_{subject}_{grain}" }
    ADS: { label: "Application/Report", naming: "ads_{app}_{purpose}" }
  registration_schema:
    required: [name, type, warehouse_layer, database, schema_name, table_name, columns]
    type_enum: [fact, dimension, bridge, aggregate]
