# L1 Entity: Virtual Views
virtual_views:
  description: "Pre-compiled cross-entity views. Built at setup, used at query time."
  schema:
    name: string
    base_entity: string
    joins: { type: array, items: { entity: string, on_clause: string, join_type: string } }
    compiled_sql: string
    materialized: { type: boolean, default: false }
