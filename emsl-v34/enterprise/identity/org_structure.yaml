# Cross-cutting: Organization Structure
org_structure:
  company: "Acme Corp"
  hierarchy:
    - { level: 1, name: business_unit, members: [{id: BU_RETAIL}, {id: BU_CORP}] }
    - { level: 2, name: department, members: [{id: DEPT_ENG, parent: BU_RETAIL}, {id: DEPT_FIN, parent: BU_CORP}, {id: DEPT_HR, parent: BU_CORP}] }
