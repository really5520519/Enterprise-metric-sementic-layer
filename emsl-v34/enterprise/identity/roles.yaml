# Cross-cutting: Identity Roles
roles:
  - { name: executive,          level: C_suite,  cross_domain: true,  pii_access: false }
  - { name: domain_owner,       level: VP,       cross_domain: true,  pii_access: false }
  - { name: analyst,            level: IC,       cross_domain: limited, pii_access: false }
  - { name: data_engineer,      level: IC,       cross_domain: true,  pii_access: false }
  - { name: hr_admin,           level: IC,       cross_domain: false, pii_access: true, pii_scope: [hr] }
  - { name: finance_controller, level: Manager,  cross_domain: true,  pii_access: false }
