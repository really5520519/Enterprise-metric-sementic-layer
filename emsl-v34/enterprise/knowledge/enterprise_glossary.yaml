# L7 Knowledge: Enterprise Glossary (depends on L4 metric_ref)
enterprise_glossary:
  version: "1.0.0"
  terms:
    - term: revenue
      aliases: ["income", "sales revenue"]
      golden_definition: { authoritative_domain: finance, definition: "GAAP recognized revenue" }
      domain_variants:
        sales: { metric: net_revenue, note: "non-GAAP" }
        finance: { metric: recognized_revenue, note: "GAAP" }
    - term: headcount
      aliases: ["HC", "employee count"]
      golden_definition: { authoritative_domain: hr, definition: "Active FTE employees on payroll" }
