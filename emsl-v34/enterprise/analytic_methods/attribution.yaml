# L5 Method: Attribution Analysis
analytic_method:
  name: attribution_analysis
  category: analytics
  compatible_objects: [order, campaign]
  trigger_intents: ["channel attribution", "which channel contributed most"]
  models:
    - { name: last_touch, type: sql }
    - { name: shapley,    type: python, entrypoint: "methods.attribution.shapley" }
  output_format: ranked_table
