# L5 Method: Plugin Schema (depends on L1, L2, L4)
analytic_method_schema:
  required: [name, category, description]
  category_enum: [analytics, forecasting, diagnostic, optimization, anomaly_detection]
  optional:
    - compatible_objects
    - trigger_intents
    - models
    - output_format
