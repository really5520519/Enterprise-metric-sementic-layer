# ESML Enterprise Shared Layer: Common Dimensions Index
common_dimensions:
  - { name: enterprise_time, ref: "dimensions/time_dimension.yaml", shared: true }
  - { name: enterprise_org,  ref: "dimensions/org_hierarchy.yaml",  shared: true }
  - { name: enterprise_geo,  ref: "dimensions/geo_hierarchy.yaml",  shared: true }
  domain_join_protocols:
    sales:   { time: "order_date",    org: "department_id" }
    finance: { time: "posting_date",  org: "cost_center_id" }
    hr:      { time: "snapshot_month", org: "department_id" }
